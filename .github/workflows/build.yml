name: Build Installer (Windows + Mac)

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Fix Python distutils (Python 3.12+)
        run: pip install setuptools

      - name: Install dependencies (skip native compile)
        run: npm install --ignore-scripts

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --force
        env:
          npm_config_msvs_version: '2022'

      - name: Build Windows Installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old release
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release with Windows installer
        shell: bash
        run: |
          gh release create latest \
            "dist/LeadFinder-Setup-${{ steps.version.outputs.version }}.exe" \
            --title "LeadFinder v${{ steps.version.outputs.version }}" \
            --notes "Windows: LeadFinder-Setup.exe herunterladen und doppelklicken. Mac: LeadFinder-mac.dmg herunterladen, oeffnen und in Programme ziehen." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-14
    needs: build-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install production dependencies
        run: npm install --omit=dev --ignore-scripts

      - name: Fix Python distutils (Python 3.12+)
        run: pip3 install setuptools

      - name: Rebuild better-sqlite3 for arm64 (native Node)
        run: npm rebuild better-sqlite3 --target_arch=arm64

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Bundle app resources into Mac target
        run: |
          mkdir -p mac/LeadFinder/Resources/app/src
          mkdir -p mac/LeadFinder/Resources/app/public
          cp server.js mac/LeadFinder/Resources/app/
          cp -r src/   mac/LeadFinder/Resources/app/src/
          cp -r public/ mac/LeadFinder/Resources/app/public/
          cp -r node_modules/ mac/LeadFinder/Resources/app/node_modules/
          cp package.json mac/LeadFinder/Resources/app/
          cp "$(which node)" mac/LeadFinder/Resources/node
          chmod +x mac/LeadFinder/Resources/node

      - name: Generate Xcode project
        working-directory: mac
        run: xcodegen generate

      - name: Build app
        working-directory: mac
        run: |
          xcodebuild \
            -project LeadFinder.xcodeproj \
            -scheme LeadFinder \
            -configuration Release \
            -archivePath build/LeadFinder.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Export .app from archive
        run: |
          cp -r mac/build/LeadFinder.xcarchive/Products/Applications/LeadFinder.app /tmp/LeadFinder.app

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "LeadFinder" \
            -srcfolder /tmp/LeadFinder.app \
            -ov -format UDZO \
            /tmp/LeadFinder-mac.dmg

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload Mac DMG to release
        run: gh release upload latest "/tmp/LeadFinder-mac.dmg" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
