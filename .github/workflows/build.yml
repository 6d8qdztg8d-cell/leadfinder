name: Build Windows Installer

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Windows Installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old release
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create GitHub Release
        run: gh release create latest "dist/LeadFinder-Setup.exe" --title "LeadFinder — Windows Installer" --notes "Installer herunterladen, doppelklicken und installieren. Kein Chrome nötig — alles inklusive." --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
