name: Build Windows Installer

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --force
        env:
          npm_config_msvs_version: '2022'

      - name: Build Windows Installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old release
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        run: gh release create latest "dist/LeadFinder-Setup-${{ steps.version.outputs.version }}.exe" --title "LeadFinder v${{ steps.version.outputs.version }}" --notes "Version ${{ steps.version.outputs.version }} — Installer herunterladen und doppelklicken. Überschreibt automatisch alte Versionen." --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
