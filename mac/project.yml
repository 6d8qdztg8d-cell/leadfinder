name: LeadFinder
options:
  bundleIdPrefix: com.leadfinder
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  LeadFinder:
    type: application
    platform: macOS
    sources:
      - path: LeadFinder/Sources
        type: group
    resources:
      - path: LeadFinder/Resources
        type: folder
    info:
      path: LeadFinder/Info.plist
      properties:
        CFBundleName: LeadFinder
        CFBundleDisplayName: LeadFinder
        CFBundleIdentifier: com.leadfinder.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "2.2.0"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundlePackageType: APPL
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "13.0"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    preBuildScripts:
      - name: "Copy Node.js + Server Files"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          PROJ="$SRCROOT/.."
          RES="$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Resources"
          mkdir -p "$RES/app"

          # node binary — copy once
          if [ ! -f "$RES/node" ]; then
            NODE_BIN=""
            if command -v node >/dev/null 2>&1; then
              NODE_BIN=$(command -v node)
            fi
            if [ -z "$NODE_BIN" ]; then
              for p in /opt/homebrew/bin/node /usr/local/bin/node /usr/bin/node; do
                if [ -f "$p" ]; then NODE_BIN="$p"; break; fi
              done
            fi
            if [ -n "$NODE_BIN" ]; then
              cp "$NODE_BIN" "$RES/node"
              chmod +x "$RES/node"
            fi
          fi

          # server files — always copy latest
          cp "$PROJ/server.js"    "$RES/app/server.js"
          cp "$PROJ/package.json" "$RES/app/package.json"

          # src/ and public/ — fresh copy each build
          rm -rf "$RES/app/src"
          cp -r  "$PROJ/src"    "$RES/app/src"
          rm -rf "$RES/app/public"
          cp -r  "$PROJ/public" "$RES/app/public"

          # node_modules — copy once (too large to redo each build)
          if [ ! -d "$RES/app/node_modules" ]; then
            cp -r "$PROJ/node_modules" "$RES/app/node_modules"
          fi

    settings:
      base:
        PRODUCT_NAME: LeadFinder
        PRODUCT_BUNDLE_IDENTIFIER: com.leadfinder.app
